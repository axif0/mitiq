<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Background regions -->
  <rect x="0" y="0" width="120" height="380" fill="#ffff93" stroke="none"/>
  <rect x="120" y="0" width="420" height="380" fill="#a2d0aa" stroke="none"/>
  <rect x="540" y="0" width="260" height="380" fill="#ccffaa" stroke="none"/>

  <!-- Region labels -->
  <text x="60" y="28" font-family="'Lucida Console', monospace" font-size="15" text-anchor="middle" font-weight="bold">User</text>
  <text x="330" y="28" font-family="'Lucida Console', monospace" font-size="15" text-anchor="middle" font-weight="bold">mitiq (PT + QEM)</text>
  <text x="670" y="28" font-family="'Lucida Console', monospace" font-size="15" text-anchor="middle" font-weight="bold">Hardware</text>

  <!-- User input -->
  <rect x="10" y="55" width="100" height="65" rx="4" fill="#ffffe1" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="82" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">Quantum</text>
  <text x="60" y="96" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">program</text>

  <!-- Arrow: user -> step 1 -->
  <line x1="110" y1="87" x2="130" y2="87" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: QEM noise scaling -->
  <rect x="135" y="48" width="190" height="35" rx="4" fill="#e8d0f0" stroke="#666" stroke-width="1"/>
  <text x="230" y="63" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">1. QEM: Generate noise-scaled</text>
  <text x="230" y="75" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">   circuits (e.g. ZNE folding)</text>

  <!-- Noise-scaled circuits -->
  <rect x="155" y="92" width="90" height="38" rx="3" fill="#e8d0f0" stroke="#333" stroke-width="1" opacity="0.7"/>
  <rect x="165" y="98" width="90" height="38" rx="3" fill="#e8d0f0" stroke="#333" stroke-width="1" opacity="0.8"/>
  <rect x="175" y="104" width="90" height="38" rx="3" fill="#e8d0f0" stroke="#333" stroke-width="1"/>
  <text x="220" y="122" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">Noise-scaled</text>
  <text x="220" y="133" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">circuits</text>

  <!-- Arrow: noise-scaled -> step 2 -->
  <line x1="265" y1="123" x2="315" y2="123" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: PT twirling (for each noise-scaled circuit) -->
  <rect x="335" y="48" width="190" height="35" rx="4" fill="#ddffff" stroke="#666" stroke-width="1"/>
  <text x="430" y="63" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">2. PT: For each, generate N</text>
  <text x="430" y="75" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">   twirled circuit variants</text>

  <!-- Twirled circuits (more stacked) -->
  <rect x="330" y="92" width="80" height="38" rx="3" fill="#ddffff" stroke="#333" stroke-width="1" opacity="0.6"/>
  <rect x="340" y="98" width="80" height="38" rx="3" fill="#ddffff" stroke="#333" stroke-width="1" opacity="0.7"/>
  <rect x="350" y="104" width="80" height="38" rx="3" fill="#ddffff" stroke="#333" stroke-width="1" opacity="0.8"/>
  <rect x="360" y="110" width="80" height="38" rx="3" fill="#ddffff" stroke="#333" stroke-width="1"/>
  <text x="400" y="128" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">Twirled</text>
  <text x="400" y="139" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">variants</text>

  <!-- Arrow: twirled -> hardware -->
  <line x1="440" y1="130" x2="555" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Execute on hardware -->
  <rect x="560" y="48" width="195" height="35" rx="4" fill="#f2f2f2" stroke="#666" stroke-width="1"/>
  <text x="657" y="63" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">3. Execute all circuits</text>
  <text x="657" y="75" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">   on backend</text>

  <!-- Hardware results -->
  <rect x="590" y="92" width="80" height="38" rx="3" fill="#fff" stroke="#333" stroke-width="1" opacity="0.6"/>
  <rect x="600" y="98" width="80" height="38" rx="3" fill="#fff" stroke="#333" stroke-width="1" opacity="0.7"/>
  <rect x="610" y="104" width="80" height="38" rx="3" fill="#fff" stroke="#333" stroke-width="1" opacity="0.8"/>
  <rect x="620" y="110" width="80" height="38" rx="3" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="660" y="128" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">Execution</text>
  <text x="660" y="139" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">results</text>

  <!-- Arrow: hardware results -> step 4 (PT averaging) -->
  <path d="M 660 155 L 660 195 L 440 195" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4: PT Average -->
  <rect x="245" y="180" width="195" height="35" rx="4" fill="#ddffff" stroke="#666" stroke-width="1"/>
  <text x="342" y="195" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">4. PT: Average over twirled</text>
  <text x="342" y="207" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">   results per scale factor</text>

  <!-- Averaged values -->
  <rect x="275" y="225" width="80" height="38" rx="3" fill="#e8d0f0" stroke="#333" stroke-width="1" opacity="0.7"/>
  <rect x="285" y="231" width="80" height="38" rx="3" fill="#e8d0f0" stroke="#333" stroke-width="1" opacity="0.8"/>
  <rect x="295" y="237" width="80" height="38" rx="3" fill="#e8d0f0" stroke="#333" stroke-width="1"/>
  <text x="335" y="255" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">Averaged exp.</text>
  <text x="335" y="266" font-family="'Lucida Console', monospace" font-size="8" text-anchor="middle">per scale factor</text>

  <!-- Arrow: averaged -> step 5 (QEM extrapolation) -->
  <line x1="295" y1="255" x2="240" y2="255" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: QEM extrapolation -->
  <rect x="140" y="235" width="100" height="42" rx="4" fill="#e8d0f0" stroke="#666" stroke-width="1"/>
  <text x="190" y="253" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">5. QEM:</text>
  <text x="190" y="265" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">Extrapolate</text>

  <!-- Arrow: extrapolation -> user result -->
  <line x1="140" y1="256" x2="110" y2="256" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Result box -->
  <rect x="10" y="220" width="100" height="65" rx="4" fill="#ffffe1" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="243" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">Error-</text>
  <text x="60" y="255" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">mitigated</text>
  <text x="60" y="267" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">expectation</text>
  <text x="60" y="279" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">value</text>

  <!-- Legend -->
  <rect x="140" y="310" width="15" height="15" rx="2" fill="#e8d0f0" stroke="#666" stroke-width="0.5"/>
  <text x="162" y="322" font-family="'Lucida Console', monospace" font-size="9">QEM steps (e.g. ZNE)</text>
  <rect x="350" y="310" width="15" height="15" rx="2" fill="#ddffff" stroke="#666" stroke-width="0.5"/>
  <text x="372" y="322" font-family="'Lucida Console', monospace" font-size="9">PT steps</text>
</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="700" height="280" viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-white" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background regions -->
  <rect x="0" y="0" width="150" height="280" fill="#ffff93" stroke="none"/>
  <rect x="150" y="0" width="300" height="280" fill="#a2d0aa" stroke="none"/>
  <rect x="450" y="0" width="250" height="280" fill="#ccffaa" stroke="none"/>

  <!-- Region labels -->
  <text x="75" y="28" font-family="'Lucida Console', monospace" font-size="16" text-anchor="middle" font-weight="bold">User</text>
  <text x="300" y="28" font-family="'Lucida Console', monospace" font-size="16" text-anchor="middle" font-weight="bold">mitiq.pt</text>
  <text x="575" y="28" font-family="'Lucida Console', monospace" font-size="16" text-anchor="middle" font-weight="bold">Hardware</text>

  <!-- Step 1: User provides quantum program -->
  <rect x="15" y="60" width="120" height="80" rx="4" fill="#ffffe1" stroke="#333" stroke-width="1.5"/>
  <text x="75" y="95" font-family="'Lucida Console', monospace" font-size="11" text-anchor="middle">Quantum</text>
  <text x="75" y="112" font-family="'Lucida Console', monospace" font-size="11" text-anchor="middle">program</text>

  <!-- Arrow: User -> mitiq.pt step 1 -->
  <line x1="135" y1="100" x2="165" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Generate twirled circuits -->
  <rect x="175" y="50" width="175" height="40" rx="4" fill="#f2f2f2" stroke="#666" stroke-width="1"/>
  <text x="262" y="74" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">1. Generate N twirled</text>
  <text x="262" y="86" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">   circuit variants</text>

  <!-- Twirled circuits (stacked cards) -->
  <rect x="190" y="100" width="100" height="55" rx="3" fill="#ddffff" stroke="#333" stroke-width="1"/>
  <rect x="200" y="108" width="100" height="55" rx="3" fill="#ddffff" stroke="#333" stroke-width="1"/>
  <rect x="210" y="116" width="100" height="55" rx="3" fill="#ddffff" stroke="#333" stroke-width="1"/>
  <text x="260" y="140" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">Circuit with</text>
  <text x="260" y="152" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">twirling gates</text>
  <text x="260" y="164" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">on CNOT/CZ</text>

  <!-- Arrow: twirled circuits -> hardware -->
  <line x1="310" y1="140" x2="465" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Execute on hardware -->
  <rect x="469" y="50" width="175" height="40" rx="4" fill="#f2f2f2" stroke="#666" stroke-width="1"/>
  <text x="556" y="74" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">2. Execute each twirled</text>
  <text x="556" y="86" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">   circuit on backend</text>

  <!-- Hardware execution (stacked results) -->
  <rect x="490" y="100" width="90" height="45" rx="3" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="500" y="108" width="90" height="45" rx="3" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="510" y="116" width="90" height="45" rx="3" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="555" y="140" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">Execute</text>
  <text x="555" y="152" font-family="'Lucida Console', monospace" font-size="9" text-anchor="middle">results</text>

  <!-- Arrow: hardware -> mitiq.pt inference (curves back down) -->
  <path d="M 555 165 L 555 200 L 350 200" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Average -->
  <rect x="175" y="185" width="175" height="40" rx="4" fill="#f2f2f2" stroke="#666" stroke-width="1"/>
  <text x="262" y="203" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">3. Inference: Average</text>
  <text x="262" y="215" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">   over executed results</text>

  <!-- Arrow: mitiq.pt -> User result -->
  <line x1="175" y1="205" x2="135" y2="205" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Result box -->
  <rect x="15" y="170" width="120" height="80" rx="4" fill="#ffffe1" stroke="#333" stroke-width="1.5"/>
  <text x="75" y="200" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">Noise-tailored</text>
  <text x="75" y="214" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">expectation</text>
  <text x="75" y="228" font-family="'Lucida Console', monospace" font-size="10" text-anchor="middle">value</text>
</svg>
